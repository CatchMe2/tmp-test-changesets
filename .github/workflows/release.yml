name: Release

on:
  push:
    branches:
      - main

# Serialize releases so two quickly-merged PRs can't race on the
# version commit / npm publish.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Version and publish
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Private-only PRs merge without changesets — in that case there is
      # nothing to release and the rest of the job is skipped.
      - name: Check for pending changesets
        id: changesets
        run: |
          count=$(find .changeset -maxdepth 1 -name '*.md' ! -name 'README.md' | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Pending changesets: $count"

      - name: Version packages
        if: steps.changesets.outputs.count != '0'
        run: |
          pnpm changeset version
          pnpm install --lockfile-only

      - name: Commit version bump
        if: steps.changesets.outputs.count != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: version packages"

      - name: Build and publish to npm
        if: steps.changesets.outputs.count != '0'
        run: pnpm release
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Pushed only after a successful publish, so a failed publish leaves
      # main untouched and the run can simply be retried.
      - name: Push version commit and tags
        if: steps.changesets.outputs.count != '0'
        run: |
          git push origin main
          git push origin --tags
